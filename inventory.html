<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รับเข้าและเบิกจ่าย | ระบบจัดการธุรกิจ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase border-bottom border-secondary">
                <i class="bi bi-box-seam"></i> POS System
            </div>
            <div class="list-group list-group-flush my-3">
                <a href="dashboard.html" class="list-group-item list-group-item-action bg-transparent text-white"><i class="bi bi-speedometer2 me-2"></i> ภาพรวม (Dashboard)</a>
                <a href="inventory.html" class="list-group-item list-group-item-action bg-transparent text-white active fw-bold"><i class="bi bi-cart-plus me-2"></i> รับเข้า/เบิกจ่าย</a>
                <a href="shipping.html" class="list-group-item list-group-item-action bg-transparent text-white"><i class="bi bi-truck me-2"></i> จัดการขนส่ง</a>
                <a href="manage.html" class="list-group-item list-group-item-action bg-transparent text-white"><i class="bi bi-box me-2"></i> จัดการสินค้า</a>
                <a href="#" onclick="logout()" class="list-group-item list-group-item-action bg-transparent text-danger fw-bold mt-5"><i class="bi bi-box-arrow-left me-2"></i> ออกจากระบบ</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm">
                <h5 class="m-0 fw-bold text-dark">รับเข้าและเบิกจ่ายสินค้า</h5>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4">
                            <div class="card-body p-4">
                                <h5 class="fw-bold text-success mb-4"><i class="bi bi-box-arrow-in-down"></i> ฟอร์มรับเข้าสินค้า (IN)</h5>
                                <div class="mb-3"><label class="form-label">เลือกสินค้า</label><select id="in-product" class="form-select"><option>กำลังโหลด...</option></select></div>
                                <div class="mb-3"><label class="form-label">จำนวน (ชิ้น)</label><input type="number" id="in-qty" class="form-control" placeholder="0"></div>
                                <button class="btn btn-success w-100 fw-bold rounded-pill" onclick="submitTransaction('IN')">บันทึกรับเข้า</button>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4">
                            <div class="card-body p-4">
                                <h5 class="fw-bold text-danger mb-4"><i class="bi bi-box-arrow-up"></i> ฟอร์มเบิกจ่าย/ขาย (OUT)</h5>
                                <div class="mb-3"><label class="form-label">เลือกสินค้า</label><select id="out-product" class="form-select"><option>กำลังโหลด...</option></select></div>
                                <div class="row g-2 mb-3">
                                    <div class="col-6"><label class="form-label">ช่องทางขาย</label><select id="out-channel" class="form-select"><option>กำลังโหลด...</option></select></div>
                                    <div class="col-6"><label class="form-label">ราคาขาย (฿)</label><input type="number" id="out-price" class="form-control" placeholder="0"></div>
                                </div>
                                <div class="row g-2 mb-4">
                                    <div class="col-8"><label class="form-label">ขนส่ง</label><select id="out-shipping" class="form-select" onchange="autoFillShipping()"><option>กำลังโหลด...</option></select></div>
                                    <div class="col-4"><label class="form-label">ค่าส่ง (฿)</label><input type="number" id="out-shipping-cost" class="form-control" placeholder="0"></div>
                                </div>
                                <button class="btn btn-danger w-100 fw-bold rounded-pill" onclick="submitTransaction('OUT')">บันทึกขาย</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "ใส่_URL_WEB_APP_ของคุณที่นี่"; // 🔴 เปลี่ยนตรงนี้
        let shippingList = [];

        window.onload = async function() {
            if (!localStorage.getItem('inventory_user')) window.location.href = "index.html";
            await loadData();
        }

        async function loadData() {
            try {
                // โหลดสินค้า
                let resP = await fetch(API_URL, {method: 'POST', body: JSON.stringify({action: "getProducts"})});
                let dataP = await resP.json();
                let pOpt = '<option value="">-- เลือกสินค้า --</option>';
                dataP.data.forEach(p => pOpt += `<option value="${p.id}">${p.id} : ${p.name} (เหลือ ${p.balance})</option>`);
                document.getElementById('in-product').innerHTML = pOpt; document.getElementById('out-product').innerHTML = pOpt;

                // โหลดช่องทาง
                let resC = await fetch(API_URL, {method: 'POST', body: JSON.stringify({action: "getChannels"})});
                let dataC = await resC.json();
                let cOpt = '<option value="">-- เลือก --</option>';
                dataC.data.forEach(c => cOpt += `<option value="${c}">${c}</option>`);
                document.getElementById('out-channel').innerHTML = cOpt;

                // โหลดขนส่ง
                let resS = await fetch(API_URL, {method: 'POST', body: JSON.stringify({action: "getShipping"})});
                let dataS = await resS.json();
                shippingList = dataS.data;
                let sOpt = '<option value="">-- เลือก --</option>';
                dataS.data.forEach(s => sOpt += `<option value="${s.method}">${s.method}</option>`);
                document.getElementById('out-shipping').innerHTML = sOpt;
            } catch(e) { console.error(e); }
        }

        function autoFillShipping() {
            const selected = document.getElementById('out-shipping').value;
            const ship = shippingList.find(s => s.method === selected);
            if(ship) document.getElementById('out-shipping-cost').value = ship.cost;
        }

        async function submitTransaction(type) {
            const user = localStorage.getItem('inventory_user');
            const pre = type === "IN" ? "in" : "out";
            const productId = document.getElementById(`${pre}-product`).value;
            const qty = document.getElementById(`${pre}-qty`).value;
            
            let price = 0, channel = "", shipMethod = "", shipCost = 0;
            
            if (type === "OUT") {
                channel = document.getElementById('out-channel').value;
                price = document.getElementById('out-price').value;
                shipMethod = document.getElementById('out-shipping').value;
                shipCost = document.getElementById('out-shipping-cost').value;
                if(!channel || !shipMethod || !price) return alert("กรุณากรอกช่องทาง/ขนส่ง/ราคา ให้ครบ");
            }

            if(!productId || !qty) return alert("กรุณาเลือกสินค้าและใส่จำนวน");

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "saveTransaction", user, type, productId, qty, remark: "", sellingPrice: price, channel, shipMethod, shipCost
                    })
                });
                const res = await response.json();
                alert(res.message);
                if(res.success) location.reload();
            } catch (error) { alert("เกิดข้อผิดพลาดในการเชื่อมต่อ"); }
        }

        function logout() { localStorage.removeItem('inventory_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
