<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ภาพรวม | ระบบจัดการธุรกิจ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="d-flex" id="wrapper">
        
        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase border-bottom border-secondary">
                <i class="bi bi-box-seam"></i> POS System
            </div>
            <div class="list-group list-group-flush my-3">
                <a href="dashboard.html" class="list-group-item list-group-item-action bg-transparent text-white active fw-bold">
                    <i class="bi bi-speedometer2 me-2"></i> ภาพรวม (Dashboard)
                </a>
                <a href="inventory.html" class="list-group-item list-group-item-action bg-transparent text-white">
                    <i class="bi bi-cart-plus me-2"></i> รับเข้า/เบิกจ่าย
                </a>
                <a href="shipping.html" class="list-group-item list-group-item-action bg-transparent text-white">
                    <i class="bi bi-truck me-2"></i> จัดการขนส่ง
                </a>
                <a href="index.html" class="list-group-item list-group-item-action bg-transparent text-danger fw-bold mt-5">
                    <i class="bi bi-box-arrow-left me-2"></i> ออกจากระบบ
                </a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm">
                <div class="d-flex align-items-center">
                    <h5 class="m-0 fw-bold text-dark">สรุปยอดขายประจำวัน</h5>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                
                <div class="row g-3 mb-4">
                    <div class="col-md-4 col-sm-6">
                        <div class="card border-0 shadow-sm rounded-4 border-start border-primary border-5">
                            <div class="card-body">
                                <p class="text-muted mb-1 small fw-bold">ยอดขายรวมวันนี้</p>
                                <h3 class="text-primary fw-bold mb-0" id="display-total-sales">฿15,400</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-6">
                        <div class="card border-0 shadow-sm rounded-4 border-start border-success border-5">
                            <div class="card-body">
                                <p class="text-muted mb-1 small fw-bold">กำไรสุทธิ</p>
                                <h3 class="text-success fw-bold mb-0" id="display-total-profit">฿4,200</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4 col-sm-12">
                        <div class="card border-0 shadow-sm rounded-4 border-start border-warning border-5">
                            <div class="card-body">
                                <p class="text-muted mb-1 small fw-bold">จำนวนออเดอร์</p>
                                <h3 class="text-warning fw-bold mb-0" id="display-total-orders">32 กล่อง</h3>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4 text-center text-muted">
                        <p class="mb-0">พื้นที่สำหรับใส่กราฟ หรือ ตารางรายการสินค้าล่าสุด</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
