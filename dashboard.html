<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ภาพรวม | Bemind POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="mobile-overlay" onclick="toggleMenu()"></div>
        
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold border-bottom mb-2">
                <i class="bi bi-box-seam me-2"></i>Bemind POS
            </div>
            <div class="list-group list-group-flush">
                <a href="dashboard.html" class="list-group-item list-group-item-action active fw-bold"><i class="bi bi-speedometer2 me-2"></i> ภาพรวมระบบ</a>
                
                <a href="#inventorySubmenu" data-bs-toggle="collapse" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-box-seam me-2"></i> จัดการสต๊อก</span><i class="bi bi-chevron-down small"></i>
                </a>
                <div class="collapse" id="inventorySubmenu">
                    <a href="receive.html" class="list-group-item list-group-item-action ps-5"><i class="bi bi-box-arrow-in-down me-2"></i> รับเข้า (IN)</a>
                    <a href="issue.html" class="list-group-item list-group-item-action ps-5"><i class="bi bi-cart3 me-2"></i> จุดขายสินค้า (POS)</a>
                </div>

                <a href="shipping.html" class="list-group-item list-group-item-action"><i class="bi bi-truck me-2"></i> จัดการขนส่ง</a>
                <a href="manage.html" class="list-group-item list-group-item-action"><i class="bi bi-gear me-2"></i> จัดการสินค้า</a>
                <a href="#" onclick="logout()" class="list-group-item list-group-item-action text-danger mt-4"><i class="bi bi-box-arrow-left me-2"></i> ออกจากระบบ</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-light py-3 px-4 mb-4 border-bottom bg-white sticky-top">
                <div class="d-flex align-items-center w-100">
                    <button class="btn btn-light d-md-none me-3 rounded-circle border-0" onclick="toggleMenu()"><i class="bi bi-list fs-4"></i></button>
                    <h5 class="m-0 fw-bold text-secondary">ภาพรวมประจำวัน <span id="user-display" class="text-primary small ms-2"></span></h5>
                </div>
            </nav>

            <div class="container-fluid px-3 px-md-4 pb-5">
                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="card-custom p-4 d-flex align-items-center">
                            <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3"><i class="bi bi-cash-coin fs-2 text-primary"></i></div>
                            <div>
                                <p class="text-muted mb-0 small fw-bold">ยอดขายรวมวันนี้</p>
                                <h3 class="text-primary fw-bold mb-0" id="display-total-sales">฿0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-custom p-4 d-flex align-items-center">
                            <div class="bg-success bg-opacity-10 p-3 rounded-circle me-3"><i class="bi bi-graph-up-arrow fs-2 text-success"></i></div>
                            <div>
                                <p class="text-muted mb-0 small fw-bold">กำไรสุทธิ</p>
                                <h3 class="text-success fw-bold mb-0" id="display-total-profit">฿0</h3>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card-custom p-4 d-flex align-items-center">
                            <div class="bg-warning bg-opacity-10 p-3 rounded-circle me-3"><i class="bi bi-box-seam fs-2 text-warning"></i></div>
                            <div>
                                <p class="text-muted mb-0 small fw-bold">จำนวนออเดอร์</p>
                                <h3 class="text-warning fw-bold mb-0" id="display-total-orders">0 กล่อง</h3>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxtliSnpuO8Dzm32J9pVNMxDO0KxtaybtJtYjQuIuikBY3Grz2JNCTQA1L-XIRiTiyX/exec"; 
        function toggleMenu() { document.getElementById("wrapper").classList.toggle("toggled"); }

        window.onload = async function() {
            const currentUser = localStorage.getItem('inventory_user');
            if (!currentUser) { window.location.href = "index.html"; return; }
            document.getElementById('user-display').innerText = `(${currentUser})`;

            try {
                const response = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: "getDashboard" }) });
                const data = await response.json();
                document.getElementById('display-total-sales').innerText = "฿" + (data.todaySales || 0).toLocaleString();
                document.getElementById('display-total-profit').innerText = "฿" + (data.todayProfit || 0).toLocaleString();
                document.getElementById('display-total-orders').innerText = (data.totalShipOrders || 0) + " กล่อง";
            } catch (error) { console.error(error); }
        }
        function logout() { localStorage.removeItem('inventory_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
