<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>จุดขายสินค้า | Bemind POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .hide-arrows::-webkit-outer-spin-button,
        .hide-arrows::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .hide-arrows { -moz-appearance: textfield; }
    </style>
</head>
<body>
    <div class="d-flex" id="wrapper">
        <div id="mobile-overlay" onclick="toggleMenu()"></div>

        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold border-bottom mb-2 d-flex align-items-center justify-content-center">
    <img src="logo.jpg" alt="Bemind Logo" style="width: 42px; height: 42px; border-radius: 10px; object-fit: cover;" class="me-2 shadow-sm">
    <span style="color: var(--brand-teal); font-weight: 800; letter-spacing: 0.5px;">Bemind POS</span>
</div>
            <div class="list-group list-group-flush">
                <a href="dashboard.html" class="list-group-item list-group-item-action"><i class="bi bi-speedometer2 me-2"></i> ภาพรวมระบบ</a>
                
                <a href="#inventorySubmenu" data-bs-toggle="collapse" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-box-seam me-2"></i> จัดการสต๊อก</span>
                    <i class="bi bi-chevron-down small"></i>
                </a>
                <div class="collapse show" id="inventorySubmenu">
                    <a href="receive.html" class="list-group-item list-group-item-action ps-5"><i class="bi bi-box-arrow-in-down me-2"></i> รับเข้า (IN)</a>
                    <a href="issue.html" class="list-group-item list-group-item-action ps-5 active fw-bold"><i class="bi bi-cart3 me-2"></i> จุดขายสินค้า (POS)</a>
                </div>

                <a href="shipping.html" class="list-group-item list-group-item-action"><i class="bi bi-truck me-2"></i> จัดการขนส่ง</a>
                <a href="manage.html" class="list-group-item list-group-item-action"><i class="bi bi-gear me-2"></i> จัดการสินค้า</a>
                <a href="#" onclick="logout()" class="list-group-item list-group-item-action text-danger mt-4"><i class="bi bi-box-arrow-left me-2"></i> ออกจากระบบ</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-light py-3 px-4 mb-4 border-bottom bg-white sticky-top">
                <div class="d-flex align-items-center w-100">
                    <button class="btn btn-light d-md-none me-3 rounded-circle border-0" id="menu-toggle" onclick="toggleMenu()">
                        <i class="bi bi-list fs-4"></i>
                    </button>
                    <h5 class="m-0 fw-bold text-secondary">จุดขายสินค้า (POS Checkout)</h5>
                </div>
            </nav>

            <div class="container-fluid px-3 px-md-4 pb-5">
                <div class="row justify-content-center">
                    <div class="col-xl-9 col-lg-11">
                        
                        <div class="card-custom mb-4" style="background-color: var(--primary-light); border: 1px solid var(--primary-color);">
                            <div class="card-body p-4">
                                <div class="row g-3 align-items-end">
                                    <div class="col-12 col-md-6">
                                        <label class="fw-bold small text-primary mb-1 ps-1">เลือกสินค้าลงตะกร้า</label>
                                        <select id="pos-product" class="form-select form-select-lg border-0 shadow-sm"><option value="">กำลังโหลด...</option></select>
                                    </div>
                                    <div class="col-6 col-md-3">
                                        <label class="fw-bold small text-primary mb-1 ps-1">ราคาขาย/ชิ้น</label>
                                        <input type="number" id="pos-price" class="form-control form-control-lg border-0 shadow-sm" placeholder="฿">
                                    </div>
                                    <div class="col-6 col-md-3">
                                        <button class="btn btn-pastel-primary btn-lg w-100 fw-bold shadow-sm" onclick="addToCart()"><i class="bi bi-plus-lg me-1"></i> เพิ่ม</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="card-custom overflow-hidden">
                            <div class="card-header bg-white border-bottom-0 pt-4 px-4 pb-2">
                                <h5 class="fw-bold m-0"><i class="bi bi-receipt me-2" style="color: var(--primary-color);"></i>ใบสั่งซื้อ / ตะกร้าสินค้า</h5>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table class="table mb-0 align-middle table-borderless">
                                        <thead class="table-light">
                                            <tr>
                                                <th class="ps-4 py-3">รายการสินค้า</th>
                                                <th class="text-center">ราคา</th>
                                                <th class="text-center">จำนวน</th>
                                                <th class="text-end pe-4">รวม</th>
                                            </tr>
                                        </thead>
                                        <tbody id="cart-body">
                                            <tr><td colspan="4" class="text-center py-5 text-muted"><i class="bi bi-cart-x fs-1 d-block mb-2 opacity-50"></i>ยังไม่มีสินค้าในตะกร้า</td></tr>
                                        </tbody>
                                        
                                        <tfoot class="border-top" style="background-color: #fafbfc;">
                                            <tr>
                                                <td colspan="2" class="ps-4 pt-4 pb-3 w-50">
                                                    <div class="bg-white p-3 rounded-4 border shadow-sm">
                                                        <div class="row g-3">
                                                            <div class="col-6">
                                                                <label class="small fw-bold text-muted mb-1">วันที่ทำรายการ</label>
                                                                <input type="date" id="out-date" class="form-control form-control-sm border-0 bg-light">
                                                            </div>
                                                            <div class="col-6">
                                                                <label class="small fw-bold text-muted mb-1">หมายเหตุ</label>
                                                                <input type="text" id="out-remark" class="form-control form-control-sm border-0 bg-light" placeholder="ระบุ...">
                                                            </div>
                                                            <div class="col-6">
                                                                <label class="small fw-bold text-muted mb-1">ช่องทางขาย</label>
                                                                <select id="out-channel" class="form-select form-select-sm border-0 bg-light"><option value="">ช่องทางขาย</option></select>
                                                            </div>
                                                            <div class="col-6">
                                                                <label class="small fw-bold text-danger mb-1">โปรโมชั่น</label>
                                                                <select id="out-promo" class="form-select form-select-sm border-0 bg-light text-danger fw-bold" onchange="updateSummary()"><option value="">ไม่ใช้โปรโมชั่น</option></select>
                                                            </div>
                                                            <div class="col-6">
                                                                <label class="small fw-bold text-muted mb-1">การจัดส่ง</label>
                                                                <select id="out-shipping" class="form-select form-select-sm border-0 bg-light" onchange="updateSummary()"><option value="">ขนส่ง</option></select>
                                                            </div>
                                                            <div class="col-6">
                                                                <label class="small fw-bold text-muted mb-1">ค่าขนส่ง</label>
                                                                <input type="number" id="out-shipping-cost" class="form-control form-control-sm border-0 bg-light text-center fw-bold" onchange="updateSummary()" value="0">
                                                            </div>
                                                        </div>
                                                    </div>
                                                </td>
                                                <td class="text-end pt-4 text-muted small align-top w-25">รวมค่าสินค้า:</td>
                                                <td class="text-end pe-4 pt-4 fw-bold align-top w-25" id="sum-subtotal">฿0</td>
                                            </tr>
                                            <tr>
                                                <td colspan="2" class="p-0 border-0"></td>
                                                <td class="text-end text-muted small pb-3 border-0" id="sum-discount-text">ส่วนลด / ค่าส่ง:</td>
                                                <td class="text-end pe-4 pb-3 fw-bold text-danger border-0">
                                                    <span id="sum-discount">-฿0</span> / <span id="sum-shipping" class="text-secondary">฿0</span>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td colspan="2" class="p-0 border-0"></td>
                                                <td class="text-end px-3 py-3 border-0 bg-white rounded-start-4 shadow-sm mb-3">
                                                    <span class="fw-bold text-secondary d-block mt-2">ยอดรวมชำระสุทธิ</span>
                                                </td>
                                                <td class="text-end pe-4 py-3 border-0 bg-white rounded-end-4 shadow-sm mb-3">
                                                    <span class="fw-bold fs-3 text-primary d-block mt-1" id="sum-net">฿0</span>
                                                </td>
                                            </tr>
                                            <tr><td colspan="4" class="p-2 border-0"></td></tr> 
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                            <div class="p-4 bg-white border-top text-end rounded-bottom-4">
                                <button class="btn btn-pastel-success btn-lg px-5 fw-bold shadow-sm" onclick="showConfirmModal()">
                                    <i class="bi bi-file-earmark-check me-2"></i> ตรวจสอบและยืนยันบิล
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="confirmModal" tabindex="-1" aria-labelledby="confirmModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">
                <div class="modal-header border-0" style="background-color: var(--primary-light);">
                    <h5 class="modal-title fw-bold text-primary" id="confirmModalLabel"><i class="bi bi-receipt-cutoff me-2"></i>สรุปรายละเอียดบิล</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4" id="modal-body-content">
                </div>
                <div class="modal-footer border-0 bg-light rounded-bottom-4">
                    <button type="button" class="btn btn-white fw-bold rounded-pill px-4 border" data-bs-dismiss="modal">ย้อนกลับแก้ไข</button>
                    <button type="button" class="btn btn-pastel-success fw-bold rounded-pill px-4 shadow-sm" onclick="executeSubmitCart()" id="btn-final-confirm">
                        <i class="bi bi-check2-circle me-1"></i> ยืนยันการตัดสต๊อก
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxtliSnpuO8Dzm32J9pVNMxDO0KxtaybtJtYjQuIuikBY3Grz2JNCTQA1L-XIRiTiyX/exec";
        let productsList = [], shippingList = [], promoList = [], cart = [];
        let currentModalInstance;

        function toggleMenu() { document.getElementById("wrapper").classList.toggle("toggled"); }

        window.onload = async function() { 
            if (!localStorage.getItem('inventory_user')) window.location.href = "index.html";
            
            let now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('out-date').value = now.toISOString().slice(0,10);

            await loadData(); 
        };

        async function loadData() {
            const cachedData = localStorage.getItem('pos_init_data');
            if (cachedData) { renderDropdowns(JSON.parse(cachedData)); }

            try {
                let res = await fetch(API_URL, {
                    method: 'POST', headers: {'Content-Type': 'text/plain'}, body: JSON.stringify({action: "getInitData"})
                });
                let json = await res.json();
                if(json.success) {
                    localStorage.setItem('pos_init_data', JSON.stringify(json.data));
                    renderDropdowns(json.data);
                }
            } catch(e) { console.warn("โหมด Offline"); }
        }

        // 🟢 แก้ไขการวาด Dropdown เพื่อไม่ให้ล้างค่าที่ผู้ใช้กรอกค้างไว้
        function renderDropdowns(data) {
            productsList = data.products; shippingList = data.shipping; promoList = data.promotions;

            // จำค่าเดิมที่เลือกไว้
            const currentProd = document.getElementById('pos-product') ? document.getElementById('pos-product').value : "";
            const currentChan = document.getElementById('out-channel') ? document.getElementById('out-channel').value : "";
            const currentShip = document.getElementById('out-shipping') ? document.getElementById('out-shipping').value : "";
            const currentPromo = document.getElementById('out-promo') ? document.getElementById('out-promo').value : "";

            if(document.getElementById('pos-product')) {
                let pOpt = '<option value="">-- เลือกสินค้า --</option>';
                data.products.forEach(p => pOpt += `<option value="${p.id}">${p.id} : ${p.name} (เหลือ ${p.balance})</option>`);
                document.getElementById('pos-product').innerHTML = pOpt;
                if(currentProd) document.getElementById('pos-product').value = currentProd;
            }

            if(document.getElementById('out-channel')) {
                let cOpt = '<option value="">-- ช่องทาง --</option>';
                data.channels.forEach(c => cOpt += `<option value="${c}">${c}</option>`);
                document.getElementById('out-channel').innerHTML = cOpt;
                if(currentChan) document.getElementById('out-channel').value = currentChan;
            }

            if(document.getElementById('out-shipping')) {
                let sOpt = '<option value="">-- ขนส่ง --</option>';
                data.shipping.forEach(s => sOpt += `<option value="${s.method}">${s.method}</option>`);
                document.getElementById('out-shipping').innerHTML = sOpt;
                if(currentShip) document.getElementById('out-shipping').value = currentShip;
            }

            if(document.getElementById('out-promo')) {
                let prOpt = '<option value="">-- ไม่ใช้โปรโมชั่น --</option>';
                data.promotions.forEach(pr => prOpt += `<option value="${pr.id}">${pr.name}</option>`);
                document.getElementById('out-promo').innerHTML = prOpt;
                if(currentPromo) document.getElementById('out-promo').value = currentPromo;
            }
        }

        function addToCart() {
            const pId = document.getElementById('pos-product').value;
            const price = Number(document.getElementById('pos-price').value);
            if(!pId || !price) return alert("กรุณาเลือกสินค้าและใส่ราคาให้ครบ");

            const product = productsList.find(p => p.id === pId);
            const existing = cart.find(item => item.productId === pId && item.price === price);
            
            if(existing) { existing.qty += 1; } 
            else { cart.push({ productId: product.id, name: product.name, price: price, qty: 1, remark: "" }); }
            
            // 🟢 เคลียร์แค่ช่องเลือกสินค้าด้านบนตะกร้า
            document.getElementById('pos-product').value = ''; 
            document.getElementById('pos-price').value = '';
            updateSummary();
        }

        function removeCart(index) { cart.splice(index, 1); updateSummary(); }
        function changeQty(index, amt) { cart[index].qty += amt; if(cart[index].qty <= 0) removeCart(index); else updateSummary(); }

        function updateQtyManual(index, value) {
            let newQty = parseInt(value);
            if (isNaN(newQty) || newQty <= 0) {
                removeCart(index);
            } else {
                cart[index].qty = newQty;
                updateSummary();
            }
        }

        let finalPromoItems = []; let finalDiscount = 0;

        function updateSummary() {
            const selectedShip = document.getElementById('out-shipping').value;
            const shipObj = shippingList.find(s => s.method === selectedShip);
            
            // อัปเดตค่าส่งเฉพาะตอนที่ยังไม่ได้กรอกค่าส่งเอง
            const currentCostInput = document.getElementById('out-shipping-cost').value;
            if(shipObj && (!currentCostInput || currentCostInput == "0" || currentCostInput == "")) {
                document.getElementById('out-shipping-cost').value = shipObj.cost;
            }

            let subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let shipCost = Number(document.getElementById('out-shipping-cost').value || 0);
            const promoId = document.getElementById('out-promo').value;
            
            finalDiscount = 0; finalPromoItems = [];
            document.getElementById('sum-discount-text').innerText = "ส่วนลด / ค่าส่ง:";

            if (promoId && cart.length > 0) {
                const promo = promoList.find(p => p.id === promoId);
                document.getElementById('sum-discount-text').innerHTML = `<span class="badge bg-danger rounded-pill fw-normal">${promo.name}</span> / ค่าส่ง:`;
                
                if (promo.type === 'PERCENT') finalDiscount = subtotal * (promo.value / 100);
                else if (promo.type === 'AMOUNT') finalDiscount = promo.value > subtotal ? subtotal : promo.value;
                else if (promo.type === 'B1G1') {
                    const hasItem = cart.find(i => i.productId === promo.condition);
                    if (hasItem) {
                        const freebie = productsList.find(p => p.id === promo.condition);
                        if(freebie) finalPromoItems.push({ productId: freebie.id, name: freebie.name, price: 0, qty: hasItem.qty, remark: `แถมโปร ${promo.name}` });
                    }
                }
            }

            let netTotal = subtotal - finalDiscount + shipCost;

            let html = '';
            cart.forEach((item, idx) => {
                html += `<tr class="border-bottom">
                    <td class="ps-4 py-3">
                        <div class="fw-bold text-dark">${item.name}</div>
                        <div class="small text-muted d-md-none">฿${item.price} / ชิ้น</div>
                    </td>
                    <td class="text-center d-none d-md-table-cell text-secondary">฿${item.price}</td>
                    <td class="text-center py-3">
                        <div class="d-inline-flex align-items-center bg-white rounded-pill px-1 py-1 border shadow-sm">
                            <i class="bi bi-dash-circle text-secondary fs-5 me-1" style="cursor:pointer;" onclick="changeQty(${idx}, -1)"></i>
                            <input type="number" class="form-control form-control-sm border-0 text-center fw-bold px-1 bg-transparent hide-arrows" 
                                style="width: 45px; font-size: 1rem; box-shadow: none;" 
                                value="${item.qty}" 
                                onchange="updateQtyManual(${idx}, this.value)" 
                                onclick="this.select()">
                            <i class="bi bi-plus-circle-fill text-primary fs-5 ms-1" style="cursor:pointer;" onclick="changeQty(${idx}, 1)"></i>
                        </div>
                    </td>
                    <td class="text-end pe-4 py-3 fw-bold text-dark">
                        ฿${(item.price * item.qty).toLocaleString()}
                        <i class="bi bi-trash3 text-danger ms-3 opacity-75" style="cursor:pointer;" onclick="removeCart(${idx})"></i>
                    </td>
                </tr>`;
            });

            finalPromoItems.forEach(free => {
                html += `<tr style="background-color: var(--danger-color); opacity: 0.15;">
                    <td class="ps-4 py-2 fw-bold text-danger"><i class="bi bi-gift me-2"></i>${free.name}</td>
                    <td class="text-center d-none d-md-table-cell">฿0</td>
                    <td class="text-center py-2 fw-bold text-danger">${free.qty}</td>
                    <td class="text-end pe-4 py-2 text-danger fw-bold">แถมฟรี</td>
                </tr>`;
            });

            if(cart.length === 0) html = '<tr><td colspan="4" class="text-center py-5 text-muted"><i class="bi bi-cart-x fs-1 d-block mb-2 opacity-50"></i>ยังไม่มีสินค้าในตะกร้า</td></tr>';

            document.getElementById('cart-body').innerHTML = html;
            document.getElementById('sum-subtotal').innerText = `฿${subtotal.toLocaleString()}`;
            document.getElementById('sum-discount').innerText = `-฿${finalDiscount.toLocaleString()}`;
            document.getElementById('sum-shipping').innerText = `฿${shipCost.toLocaleString()}`;
            document.getElementById('sum-net').innerText = `฿${netTotal.toLocaleString()}`;
        }

        function showConfirmModal() {
            if(cart.length === 0) return alert("ตะกร้าสินค้าว่างเปล่า ไม่สามารถสร้างบิลได้");
            
            const transDate = document.getElementById('out-date').value;
            const globalRemark = document.getElementById('out-remark').value || "-";
            const channel = document.getElementById('out-channel').value;
            const shipMethod = document.getElementById('out-shipping').value;
            const shipCost = document.getElementById('out-shipping-cost').value;
            const promoSelect = document.getElementById('out-promo');
            const promoText = promoSelect.value ? promoSelect.options[promoSelect.selectedIndex].text : "ไม่ใช้โปรโมชั่น";

            if(!transDate) return alert("กรุณาเลือกวันที่ทำรายการ");
            if(!channel || !shipMethod || channel==="" || shipMethod==="") return alert("กรุณาเลือกช่องทางขายและขนส่งให้ครบถ้วน");

            let subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let netTotal = subtotal - finalDiscount + Number(shipCost);

            let detailsHtml = `
                <div class="mb-3">
                    <div class="row small text-muted mb-1"><div class="col-4">วันที่บิล:</div><div class="col-8 fw-bold text-dark text-end">${transDate}</div></div>
                    <div class="row small text-muted mb-1"><div class="col-4">ช่องทาง:</div><div class="col-8 fw-bold text-dark text-end">${channel}</div></div>
                    <div class="row small text-muted mb-1"><div class="col-4">การจัดส่ง:</div><div class="col-8 fw-bold text-dark text-end">${shipMethod} (฿${Number(shipCost).toLocaleString()})</div></div>
                    <div class="row small text-muted mb-1"><div class="col-4">โปรโมชั่น:</div><div class="col-8 fw-bold text-danger text-end">${promoText}</div></div>
                    <div class="row small text-muted"><div class="col-4">หมายเหตุ:</div><div class="col-8 fw-bold text-dark text-end text-truncate">${globalRemark}</div></div>
                </div>
                
                <div class="fw-bold mb-2 small text-secondary">รายการสินค้าในบิล:</div>
                <ul class="list-group list-group-flush mb-4 border rounded-3 overflow-hidden small shadow-sm">
            `;

            cart.forEach(item => {
                detailsHtml += `<li class="list-group-item d-flex justify-content-between align-items-center bg-white border-bottom px-3 py-2">
                    <div><span class="fw-bold text-dark">${item.name}</span> <span class="text-muted ms-1">x${item.qty}</span></div>
                    <div class="fw-bold text-dark">฿${(item.price * item.qty).toLocaleString()}</div>
                </li>`;
            });

            finalPromoItems.forEach(free => {
                detailsHtml += `<li class="list-group-item d-flex justify-content-between align-items-center bg-danger bg-opacity-10 border-bottom px-3 py-2 text-danger">
                    <div><i class="bi bi-gift me-1"></i> <span class="fw-bold">${free.name}</span> <span class="ms-1 opacity-75">x${free.qty}</span></div>
                    <div class="fw-bold">ฟรี</div>
                </li>`;
            });

            detailsHtml += `</ul>
                <div class="d-flex justify-content-between align-items-center p-3 rounded-3" style="background-color: var(--primary-light); border: 1px solid var(--primary-color);">
                    <span class="fw-bold text-primary">ยอดสุทธิที่ต้องตัดชำระ</span>
                    <span class="fw-bold fs-3 text-primary">฿${netTotal.toLocaleString()}</span>
                </div>
            `;

            document.getElementById('modal-body-content').innerHTML = detailsHtml;
            currentModalInstance = new bootstrap.Modal(document.getElementById('confirmModal'));
            currentModalInstance.show();
        }

        async function executeSubmitCart() {
            const transDate = document.getElementById('out-date').value;
            const globalRemark = document.getElementById('out-remark').value;
            const channel = document.getElementById('out-channel').value;
            const shipMethod = document.getElementById('out-shipping').value;
            const shipCost = document.getElementById('out-shipping-cost').value;
            const user = localStorage.getItem('inventory_user') || 'Admin';

            let finalPayloadCart = [];
            let subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            let discountRatio = finalDiscount > 0 ? (subtotal - finalDiscount) / subtotal : 1;

            cart.forEach(item => {
                finalPayloadCart.push({ productId: item.productId, qty: item.qty, remark: item.remark, price: finalDiscount > 0 ? (item.price * discountRatio) : item.price });
            });
            finalPromoItems.forEach(free => finalPayloadCart.push(free));

            const btn = document.getElementById('btn-final-confirm');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึกข้อมูล...';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST', headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "saveCartTransaction", user, cart: finalPayloadCart, channel, shipMethod, shipCost, netTotal: (subtotal - finalDiscount + Number(shipCost)), date: transDate, globalRemark: globalRemark })
                });
                const res = await response.json();
                
                currentModalInstance.hide();
                alert(res.message);
                if(res.success) {
                    cart = [];
                    document.getElementById('out-channel').selectedIndex = 0;
                    document.getElementById('out-shipping').selectedIndex = 0;
                    document.getElementById('out-promo').selectedIndex = 0;
                    document.getElementById('out-shipping-cost').value = 0;
                    document.getElementById('out-remark').value = '';
                    
                    updateSummary();
                    localStorage.removeItem('pos_init_data');
                    await loadData();
                }
            } catch (error) { 
                currentModalInstance.hide();
                alert("เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองอีกครั้ง"); 
            }
            
            btn.innerHTML = '<i class="bi bi-check2-circle me-1"></i> ยืนยันการตัดสต๊อก'; 
            btn.disabled = false;
        }

        function logout() { localStorage.removeItem('inventory_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
