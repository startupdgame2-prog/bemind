<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการสินค้า | ระบบจัดการธุรกิจ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="d-flex" id="wrapper">
        <div class="bg-dark text-white" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fs-4 fw-bold text-uppercase border-bottom border-secondary">
                <i class="bi bi-box-seam"></i> POS System
            </div>
            <div class="list-group list-group-flush my-3">
                <a href="dashboard.html" class="list-group-item list-group-item-action bg-transparent text-white"><i class="bi bi-speedometer2 me-2"></i> ภาพรวม (Dashboard)</a>
                <a href="inventory.html" class="list-group-item list-group-item-action bg-transparent text-white"><i class="bi bi-cart-plus me-2"></i> รับเข้า/เบิกจ่าย</a>
                <a href="shipping.html" class="list-group-item list-group-item-action bg-transparent text-white"><i class="bi bi-truck me-2"></i> จัดการขนส่ง</a>
                <a href="manage.html" class="list-group-item list-group-item-action bg-transparent text-white active fw-bold"><i class="bi bi-box me-2"></i> จัดการสินค้า</a>
                <a href="#" onclick="logout()" class="list-group-item list-group-item-action bg-transparent text-danger fw-bold mt-5"><i class="bi bi-box-arrow-left me-2"></i> ออกจากระบบ</a>
            </div>
        </div>

        <div id="page-content-wrapper" class="w-100">
            <nav class="navbar navbar-expand-lg navbar-light bg-white py-3 px-4 shadow-sm">
                <h5 class="m-0 fw-bold text-dark">ระบบจัดการสินค้าและช่องทาง</h5>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="card border-0 shadow-sm rounded-4 mb-4">
                    <div class="card-body p-4">
                        <h5 class="fw-bold text-primary mb-4"><i class="bi bi-plus-circle"></i> เพิ่มสินค้าใหม่</h5>
                        <div class="row g-3 mb-3">
                            <div class="col-md-2"><input type="text" id="new-id" class="form-control" placeholder="รหัสสินค้า"></div>
                            <div class="col-md-4"><input type="text" id="new-name" class="form-control" placeholder="ชื่อสินค้า"></div>
                            <div class="col-md-2"><input type="text" id="new-cat" class="form-control" placeholder="หมวดหมู่"></div>
                            <div class="col-md-2"><input type="number" id="new-bal" class="form-control" placeholder="จำนวนเริ่ม"></div>
                            <div class="col-md-2"><input type="number" id="new-cost" class="form-control" placeholder="ทุน/ชิ้น"></div>
                        </div>
                        <button class="btn btn-primary w-100 fw-bold rounded-pill" onclick="handleAddProduct()">เพิ่มเข้าระบบ</button>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-body p-4">
                                <h5 class="fw-bold text-danger mb-4"><i class="bi bi-trash"></i> ลบสินค้าออก</h5>
                                <div class="input-group mb-3">
                                    <select id="del-product" class="form-select"><option>กำลังโหลด...</option></select>
                                    <button class="btn btn-outline-danger fw-bold" onclick="handleDeleteProduct()">ลบทิ้ง</button>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="card border-0 shadow-sm rounded-4 h-100">
                            <div class="card-body p-4">
                                <h5 class="fw-bold text-info mb-4"><i class="bi bi-shop"></i> เพิ่มช่องทางขาย</h5>
                                <div class="input-group mb-3">
                                    <input type="text" id="new-channel" class="form-control" placeholder="เช่น Shopee">
                                    <button class="btn btn-info text-white fw-bold" onclick="handleAddChannel()">เพิ่ม</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ใส่ API ของคุณเรียบร้อยแล้ว
        const API_URL = "https://script.google.com/macros/s/AKfycbxtliSnpuO8Dzm32J9pVNMxDO0KxtaybtJtYjQuIuikBY3Grz2JNCTQA1L-XIRiTiyX/exec"; 

        window.onload = function() {
            if (!localStorage.getItem('inventory_user')) window.location.href = "index.html";
            loadProductsForDelete();
        }

        async function loadProductsForDelete() {
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: "getProducts" }) 
                });
                const res = await response.json();
                let opt = '<option value="">-- เลือกสินค้า --</option>';
                if(res.success) { res.data.forEach(p => opt += `<option value="${p.id}">${p.id} : ${p.name}</option>`); }
                document.getElementById('del-product').innerHTML = opt;
            } catch (error) { console.error(error); }
        }

        async function handleAddProduct() {
            const id = document.getElementById('new-id').value, name = document.getElementById('new-name').value;
            const cat = document.getElementById('new-cat').value, bal = document.getElementById('new-bal').value;
            const cost = document.getElementById('new-cost').value, user = localStorage.getItem('inventory_user');

            if(!id || !name) return alert("กรุณาใส่รหัสและชื่อ");
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: "addProduct", id, name, cat, bal, cost, user }) 
                });
                const res = await response.json();
                alert(res.message); if(res.success) location.reload();
            } catch (error) { alert("เชื่อมต่อล้มเหลว"); }
        }

        async function handleDeleteProduct() {
            const id = document.getElementById('del-product').value, user = localStorage.getItem('inventory_user');
            if(!id) return alert("กรุณาเลือกสินค้า");
            if(!confirm("ยืนยันลบ?")) return;
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: "deleteProduct", id, user }) 
                });
                const res = await response.json();
                alert(res.message); if(res.success) loadProductsForDelete();
            } catch (error) {}
        }

        async function handleAddChannel() {
            const channel = document.getElementById('new-channel').value, user = localStorage.getItem('inventory_user');
            if(!channel) return alert("พิมพ์ชื่อช่องทาง");
            try {
                const response = await fetch(API_URL, { 
                    method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ action: "addChannel", channel, user }) 
                });
                const res = await response.json();
                alert(res.message); if(res.success) document.getElementById('new-channel').value = '';
            } catch (error) {}
        }

        function logout() { localStorage.removeItem('inventory_user'); window.location.href = "index.html"; }
    </script>
</body>
</html>
