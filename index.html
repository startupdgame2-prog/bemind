<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ | ระบบจัดการธุรกิจ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 col-sm-8">
                <div class="card shadow border-0 rounded-4 p-4">
                    <div class="text-center mb-4">
                        <h3 class="fw-bold text-primary">📦 POS & Inventory</h3>
                        <p class="text-muted small">ลงชื่อเข้าใช้งานระบบ</p>
                    </div>
                    
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-3">
                            <label class="form-label fw-bold">ชื่อผู้ใช้งาน</label>
                            <input type="text" id="username" class="form-control" required placeholder="Username">
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold">รหัสผ่าน</label>
                            <input type="password" id="password" class="form-control" required placeholder="Password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2 rounded-pill">เข้าสู่ระบบ</button>
                    </form>
                    
                </div>
            </div>
        </div>
    </div>

    <script>
        // จำลองการ Login (เดี๋ยวเราค่อยเชื่อมกับ Google Sheets API ทีหลัง)
        function handleLogin(e) {
            e.preventDefault(); 
            // สมมติว่า Login ผ่าน ให้เปลี่ยนหน้าไปที่ dashboard.html
            window.location.href = "dashboard.html";
        }
    </script>
</body>
</html>
