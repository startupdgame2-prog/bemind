<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เข้าสู่ระบบ | Bemind POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex align-items-center" style="height: 100vh; background-color: var(--pastel-blue-light);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4 col-sm-8">
                <div class="card-custom p-4 p-md-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-box-seam text-primary" style="font-size: 3rem; color: var(--pastel-blue) !important;"></i>
                        <h3 class="fw-bold mt-2" style="color: var(--pastel-blue);">Bemind POS</h3>
                        <p class="text-muted small">ระบบจัดการธุรกิจและคลังสินค้า</p>
                    </div>
                    <form id="loginForm" onsubmit="handleLogin(event)">
                        <div class="mb-3 text-start">
                            <label class="form-label fw-bold small text-muted">ชื่อผู้ใช้งาน</label>
                            <input type="text" id="username" class="form-control form-control-lg bg-light border-0 rounded-3" required placeholder="Username">
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label fw-bold small text-muted">รหัสผ่าน</label>
                            <input type="password" id="password" class="form-control form-control-lg bg-light border-0 rounded-3" required placeholder="Password">
                        </div>
                        <button type="submit" class="btn btn-pastel-primary btn-lg w-100 fw-bold rounded-pill">เข้าสู่ระบบ</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxtliSnpuO8Dzm32J9pVNMxDO0KxtaybtJtYjQuIuikBY3Grz2JNCTQA1L-XIRiTiyX/exec"; 

        async function handleLogin(e) {
            e.preventDefault(); 
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const btn = document.querySelector('button[type="submit"]');
            
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังตรวจสอบ...';
            btn.disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST', headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify({ action: "login", username: user, password: pass })
                });
                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('inventory_user', data.name);
                    window.location.href = "dashboard.html";
                } else {
                    alert("❌ " + data.message);
                    btn.innerHTML = 'เข้าสู่ระบบ'; btn.disabled = false;
                }
            } catch (error) { alert("⚠️ ไม่สามารถเชื่อมต่อระบบได้"); btn.innerHTML = 'เข้าสู่ระบบ'; btn.disabled = false; }
        }
    </script>
</body>
</html>
